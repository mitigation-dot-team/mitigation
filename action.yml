name: "MergeShield - PR Risk Analysis"
description: "Calculates a risk score (0-10) for each PR using heuristics + LLM. Risk visibility for CTOs."
author: "MergeShield"
branding:
  icon: "shield"
  color: "blue"
inputs:
  mergeshield-api-key:
    description: "MergeShield API key for plan validation and account association. Get yours at https://mitigation.team"
    required: true
  github-token:
    description: "GitHub token to access the API (pull requests, comments)"
    required: true
  llm-provider:
    description: "LLM provider: openai, claude, azure (default: openai)"
    required: false
    default: "openai"
  llm-api-key:
    description: "API key for the selected LLM provider (optional)"
    required: false
    default: ""
  llm-model:
    description: "Model to use. Default: gpt-4o-mini (OpenAI), claude-3-5-sonnet-20241022 (Claude), gpt-4o-mini (Azure)"
    required: false
    default: ""
  enable-llm:
    description: "Enable contextual LLM analysis (requires llm-api-key)"
    required: false
    default: "false"
  risk-threshold:
    description: "Minimum score to fail the check (0-10). Default: 7"
    required: false
    default: "7"
  webhook-url:
    description: "Webhook URL to send analysis results to (optional)"
    required: false
    default: ""
  webhook-secret:
    description: "HMAC secret to sign the webhook payload (optional but recommended)"
    required: false
    default: ""
  internal-reporter-url:
    description: "MergeShield internal system URL to report analysis results (optional)"
    required: false
    default: ""
  internal-reporter-secret:
    description: "HMAC secret to authenticate with the internal system (optional but recommended)"
    required: false
    default: ""
  comment-language:
    description: "Language for the PR comment: en (English) or es (Spanish). Default: en"
    required: false
    default: "en"
outputs:
  risk-score:
    description: "Final risk score (0-10)"
  risk-level:
    description: "Risk level: low, medium, high"
  heuristic-score:
    description: "Heuristic analysis score (0-10)"
  llm-score:
    description: "LLM analysis score (0-10), empty if LLM is disabled"
  llm-justification:
    description: "LLM justification"
runs:
  using: "node24"
  main: "dist/index.js"
