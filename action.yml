name: "MergeShield - PR Risk Analysis"
description: "Calcula un score de riesgo (0-10) para cada PR usando heurísticas + LLM. Visibilidad de riesgo para CTOs."
author: "MergeShield"

branding:
  icon: "shield"
  color: "blue"

inputs:
  mergeshield-api-key:
    description: "MergeShield API key for plan validation and account association. Get yours at https://mergeshield.dev"
    required: true
  github-token:
    description: "GitHub token para acceder a la API (pull requests, comments)"
    required: true
  llm-provider:
    description: "Proveedor de LLM: openai, claude, azure (default: openai)"
    required: false
    default: "openai"
  llm-api-key:
    description: "API key del proveedor LLM seleccionado (opcional)"
    required: false
    default: ""
  llm-model:
    description: "Modelo a usar. Default: gpt-4o-mini (OpenAI), claude-3-5-sonnet-20241022 (Claude), gpt-4o-mini (Azure)"
    required: false
    default: ""
  enable-llm:
    description: "Activar análisis LLM contextual (requiere llm-api-key)"
    required: false
    default: "false"
  risk-threshold:
    description: "Score mínimo para fallar el check (0-10). Default: 7"
    required: false
    default: "7"
  webhook-url:
    description: "URL webhook para enviar resultados del análisis (opcional)"
    required: false
    default: ""
  webhook-secret:
    description: "Secret HMAC para firmar el payload del webhook (opcional pero recomendado)"
    required: false
    default: ""
  internal-reporter-url:
    description: "URL del sistema interno de MergeShield para reportar análisis (opcional)"
    required: false
    default: ""
  internal-reporter-secret:
    description: "Secret HMAC para autenticar con el sistema interno (opcional pero recomendado)"
    required: false
    default: ""
  comment-language:
    description: "Language for the PR comment: en (English) or es (Spanish). Default: en"
    required: false
    default: "en"
  # Retrocompatibilidad: openai-api-key reemplazado por llm-api-key
  openai-api-key:
    description: "DEPRECATED: Usar llm-api-key en su lugar"
    required: false
    default: ""

outputs:
  risk-score:
    description: "Score de riesgo final (0-10)"
  risk-level:
    description: "Nivel de riesgo: low, medium, high"
  heuristic-score:
    description: "Score del análisis heurístico (0-10)"
  llm-score:
    description: "Score del análisis LLM (0-10), vacío si LLM está desactivado"
  llm-justification:
    description: "Justificación del LLM"

runs:
  using: "node20"
  main: "dist/index.js"
