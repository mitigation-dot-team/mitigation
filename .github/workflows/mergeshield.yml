name: MergeShield - PR Risk Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read
  packages: read

jobs:
  risk-analysis:
    name: Analyze PR Risk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: |
          npm config set registry https://registry.npmjs.org/
          npm config set @mitigation-dot-team:registry=https://npm.pkg.github.com/
          npm config set //npm.pkg.github.com/:_authToken=${{secrets.MITIGATIONDOTTEAM}}
          npm install
        working-directory: ${{ github.workspace }}

      - name: Run MergeShield Analysis
        uses: ./
        with:
          github-token: ${{ secrets.REPO_TOKEN }}
          llm-provider: "claude"
          llm-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          risk-threshold: "7"
          enable-llm: "true"
          mergeshield-api-key: ${{ secrets.MERGESHIELD_API_KEY }}
          comment-language: "en"
