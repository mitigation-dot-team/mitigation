name: MergeShield - PR Risk Analysis

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  risk-analysis:
    name: Analyze PR Risk
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Get Internal token
        run: |
          echo "registry=https://registry.npmjs.org/" > .npmrc
          echo "@mitigation-dot-team:registry=https://npm.pkg.github.com/" >> .npmrc
          echo "//npm.pkg.github.com/:_authToken=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" >> .npmrc

      - name: Install dependencies
        run: npm ci
        working-directory: ${{ github.workspace }}

      - name: Run MergeShield Analysis
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          llm-provider: "claude"
          llm-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          risk-threshold: "7"
          enable-llm: "true"
