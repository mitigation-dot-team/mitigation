name: Build and Test
on: 
  push:
    branches:
      - '*'
jobs:
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v3
    - name: Use Node.js 
      uses: actions/setup-node@v3
    - name: Get Internal token
      run: |
        echo "registry=https://registry.npmjs.org/" > .npmrc
        echo "@mitigation-dot-team:registry=https://npm.pkg.github.com/" >> .npmrc
        echo "//npm.pkg.github.com/:_authToken=${{ secrets.MITIGATIONDOTTEAM }}" >> .npmrc
    - name: Install dependencies
      run: npm install
    - name: Testing build process (ex. ts)
      run: npm run build
    - name: Unit Testings
      run: npm run test